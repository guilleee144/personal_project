<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elden Ring Database Explorer</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'serif'; }
        .elden-card { border: 1px solid #334155; transition: all 0.3s ease; }
        .elden-card:hover { border-color: #eab308; transform: translateY(-5px); shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body>
    <div id="app" class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-yellow-600 mb-2 tracking-tighter">ELDEN WIKI</h1>
            <p class="text-slate-400 italic">Explorador de la Base de Datos Maestra</p>
        </header>

        <!-- BUSCADOR -->
        <div class="max-w-2xl mx-auto mb-10 flex gap-4">
            <input 
                v-model="search" 
                @input="fetchItems"
                type="text" 
                placeholder="Busca armas, armaduras, hechizos..." 
                class="w-full p-4 rounded-lg bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition-colors"
            >
        </div>

        <!-- GRID DE RESULTADOS -->
        <div v-if="loading" class="text-center text-yellow-500 text-2xl">Cargando la Gracia...</div>
        
        <div v-else class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div v-for="item in items" :key="item.id" class="elden-card bg-slate-900/50 p-5 rounded-xl flex flex-col items-center text-center">
                <img :src="item.image_url" :alt="item.name" class="w-32 h-32 object-contain mb-4 drop-shadow-xl">
                <span class="text-[10px] uppercase tracking-widest text-slate-500 mb-1">{{ item.metadata?.category }}</span>
                <h2 class="text-xl font-bold text-yellow-500 leading-tight mb-2">{{ item.name }}</h2>
                <p class="text-xs text-slate-400 line-clamp-3 mb-4">{{ item.description }}</p>
                
                <!-- Badge de detalles según categoría -->
                <div class="mt-auto pt-4 border-t border-slate-800 w-full flex justify-around text-[10px] text-yellow-700 font-bold uppercase">
                    <span v-if="item.weapon_details?.length">Ataque: {{ item.weapon_details[0].attack?.physical || 'N/A' }}</span>
                    <span v-if="item.armor_details?.length">Peso: {{ item.armor_details[0].weight }}</span>
                </div>
            </div>
        </div>

        <div v-if="items.length === 0 && !loading" class="text-center text-slate-500">No se encontraron tesoros con ese nombre.</div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const { createClient } = supabase;

        // --- CONFIGURA TUS CREDENCIALES AQUÍ ---
        const SUPABASE_URL = 'https://okmbpzxyexozgfjpxirb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_beCAzF6D5vhLaO7S12vPYw_vxr45KSS';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const items = ref([]);
                const search = ref('');
                const loading = ref(true);

                const fetchItems = async () => {
                    loading.value = true;
                    try {
                        let query = supabaseClient
                            .from('items')
                            .select(`
                                *,
                                weapon_details (*),
                                armor_details (*)
                            `)
                            .order('name');

                        if (search.value) {
                            query = query.ilike('name', `%${search.value}%`);
                        }

                        const { data, error } = await query.limit(20);
                        if (error) throw error;
                        items.value = data;
                    } catch (err) {
                        console.error("Error cargando datos:", err);
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(fetchItems);

                return { items, search, loading, fetchItems };
            }
        }).mount('#app');
    </script>
</body>
</html>
